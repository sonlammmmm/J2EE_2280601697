<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="product/_layout">

<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0 overflow-hidden mt-2">
                <div class="card-header bg-success py-3">
                    <h5 class="m-0 text-white fw-bold"><i class="bi bi-plus-square me-2"></i>Thêm Sản Phẩm Mới</h5>
                </div>

                <div class="card-body p-4 bg-white">
                    <form th:action="@{/products/create}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Tên Sản Phẩm</label>
                            <input th:field="*{name}" class="form-control form-control-lg border-2" placeholder="Nhập tên sản phẩm...">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giá Bán (VNĐ)</label>
                                <div class="input-group">
                                    <input th:field="*{price}" type="number" class="form-control border-2" placeholder="0">
                                    <span class="input-group-text bg-light border-2 border-start-0">₫</span>
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Danh Mục</label>
                                <select th:field="*{category.id}" class="form-select border-2">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="c : ${categories}"
                                            th:value="${c.id}"
                                            th:text="${c.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Ảnh Sản Phẩm</label>
                            <input type="file" name="imageProduct" class="form-control border-2">
                            <div class="form-text mt-1 italic">Hỗ trợ các định dạng .jpg, .png...</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1 py-2 fw-bold">
                                <i class="bi bi-save me-1"></i>Lưu Sản Phẩm
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary px-4 py-2">
                                <i class="bi bi-x-circle me-1"></i>Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

</html>
