<!DOCTYPE html>
<html layout:decorate="product/_layout"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<!DOCTYPE html>

<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="product/_layout">

<div layout:fragment="content">

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div class="card shadow border-0 overflow-hidden mt-2 text-dark">

            <div class="card-header bg-warning py-3">
                <h5 class="m-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Chỉnh Sửa Sản Phẩm</h5>
            </div>

            <div class="card-body p-4 bg-white">

                <form th:action="@{/products/edit}"
                      th:object="${product}"
                      method="post">

                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Tên Sản Phẩm</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-lg border-2 shadow-sm" placeholder="Nhập tên mới sản phẩm...">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Giá Bán (VNĐ)</label>
                            <div class="input-group shadow-sm">
                                <input th:field="*{price}" type="number" step="0.01" class="form-control border-2" placeholder="0">
                                <span class="input-group-text bg-light border-2 border-start-0">₫</span>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Danh Mục</label>
                            <select th:field="*{category.id}" class="form-select border-2 shadow-sm">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning flex-grow-1 py-2 fw-bold shadow-sm text-dark">
                            <i class="bi bi-arrow-repeat me-1"></i>Cập Nhật Theo Đổi
                        </button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary px-4 py-2 border-2">
                            <i class="bi bi-arrow-left-circle me-1"></i>Quay Lại
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

</div>

</html>
