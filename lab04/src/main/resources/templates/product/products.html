<!DOCTYPE html>

<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}"></html>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="m-0 text-primary fw-bold"><i class="bi bi-box2-fill me-2"></i>Danh Sách Sản Phẩm</h3>
        <a class="btn btn-primary" th:href="@{/products/create}">
            <i class="bi bi-plus-circle me-1"></i>Thêm Sản Phẩm Mới
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Giá</th>
                        <th>Hình Ảnh</th>
                        <th>Danh Mục</th>
                        <th class="text-center pe-3">Thao Tác</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${products.size() == 0}">
                        <td colspan="6" class="text-center py-5 text-muted italic">
                            <i class="bi bi-inbox-fill d-block fs-1"></i>
                            Không tìm thấy sản phẩm nào
                        </td>
                    </tr>

                    <tr th:each="p : ${products}">

                        <td class="ps-3" th:text="${p.id}"></td>

                        <td class="fw-medium text-dark" th:text="${p.name}"></td>

                        <td class="text-danger fw-bold" th:text="${#numbers.formatCurrency(p.price)}"></td>

                        <td>
                            <img th:if="${p.image != null}"
                                 th:src="@{'/images/' + ${p.image}}"
                                 class="rounded border shadow-sm"
                                 width="80"
                                 alt="Product image">
                            <img th:unless="${p.image != null}"
                                 src="https://placehold.co/80x80?text=No+Image"
                                 class="rounded border shadow-sm"
                                 width="80"
                                 alt="No image">
                        </td>

                        <td>
                            <span class="badge bg-info text-dark" th:text="${p.category != null ? p.category.name : 'N/A'}"></span>
                        </td>

                        <td class="text-center pe-3">
                            <div class="btn-group">
                                <a th:href="@{/products/edit/{id}(id=${p.id})}"
                                   class="btn btn-outline-warning btn-sm">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${p.id})}"
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </div>
                        </td>

                    </tr>

                    </tbody>

                </table>
            </div>
        </div>
    </div>

</div>

</html>
