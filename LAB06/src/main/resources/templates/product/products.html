<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{product/_layout}">

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-list-stars text-primary"></i> Danh sách sản phẩm</h2>
        <a th:href="@{/products/create}" class="btn btn-primary d-flex align-items-center" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle me-2"></i> Thêm sản phẩm mới
        </a>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th class="py-3">Mã SP</th>
                <th class="py-3">Hình ảnh</th>
                <th class="py-3">Tên sản phẩm</th>
                <th class="py-3">Giá bán</th>
                <th class="py-3">Phân loại</th>
                <th class="py-3 text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${products.size() == 0}">
                <td colspan="6" class="text-center py-5 text-muted">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                    Không tìm thấy sản phẩm nào
                </td>
            </tr>
            <tr th:each="p : ${products}">
                <th scope="row" th:text="${p.id}"></th>
                <td>
                    <img th:if="${p.image != null}"
                         th:src="@{'/images/' + ${p.image}}"
                         width="60" height="60"
                         class="product-img border shadow-sm rounded"
                         alt="Product Image">
                    <div th:unless="${p.image != null}" class="bg-light d-flex align-items-center justify-content-center border rounded" style="width:60px; height:60px;">
                        <i class="bi bi-card-image text-muted"></i>
                    </div>
                </td>
                <td>
                    <div class="fw-bold" th:text="${p.name}"></div>
                </td>
                <td class="text-primary fw-semibold" th:text="${p.price != null ? #numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : 'N/A'}"></td>
                <td>
                    <span class="badge bg-info-subtle text-info-emphasis border border-info"
                          th:text="${p.category != null ? p.category.name : 'N/A'}"></span>
                </td>
                <td>
                    <div class="d-flex justify-content-center gap-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/products/edit/{id}(id=${p.id})}"
                           class="btn btn-outline-warning btn-sm d-flex align-items-center">
                            <i class="bi bi-pencil-square me-1"></i> Sửa
                        </a>
                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           class="btn btn-outline-danger btn-sm d-flex align-items-center"
                           onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">
                            <i class="bi bi-trash me-1"></i> Xóa
                        </a>
                    </div>
                    <span class="text-muted small" sec:authorize="!hasRole('ADMIN')">Chỉ xem</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</html>
