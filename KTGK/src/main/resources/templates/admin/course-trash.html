<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thùng rác – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<!-- Admin Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark-mode sticky-top" style="padding:.75rem 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}" style="font-weight:700;font-size:1rem;color:#fff;display:flex;align-items:center;gap:6px;text-decoration:none;">
            <i class="bi bi-mortarboard-fill" style="color:#6ee7b7;"></i> Edu Course Hub
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <i class="bi bi-list fs-5" style="color:#fff;"></i>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/courses}">Quản lý học phần</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="user-info">
                    <i class="bi bi-shield-check" style="color:#6ee7b7;"></i>
                    <span sec:authentication="name"></span>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-ghost" style="border-color:#3a3a38;color:#a8a6a0;">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="page-shell">
    <div class="container py-4">

        <!-- Alert -->
        <div th:if="${success}" class="alert-strip alert-success-strip">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
        </div>

        <!-- Header -->
        <div class="page-header">
            <div>
                <h2>Thùng rác</h2>
                <p>Học phần đã xóa mềm. Khôi phục nếu cần.</p>
            </div>
            <a th:href="@{/admin/courses}" class="btn btn-ghost">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
        </div>

        <!-- Table -->
        <div th:if="${courses != null && !courses.isEmpty()}" class="table-card">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên học phần</th>
                    <th>Tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Danh mục</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td style="color:var(--muted);font-size:.8125rem;" th:text="${course.id}"></td>
                    <td>
                        <img th:src="${course.image != null && !course.image.isEmpty()} ? ${course.image} : 'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=200&q=60'"
                             alt="course" style="width:72px;height:44px;object-fit:cover;border-radius:6px;opacity:.6;">
                    </td>
                    <td style="font-weight:600;text-decoration:line-through;color:var(--muted);"
                        th:text="${course.name}"></td>
                    <td>
                        <span class="tag" th:text="${course.credits}"></span>
                    </td>
                    <td style="color:var(--muted);"
                        th:text="${course.lecturer != null && !course.lecturer.isEmpty()} ? ${course.lecturer} : '—'">
                    </td>
                    <td>
                        <span th:if="${course.category != null}" class="tag" th:text="${course.category.name}"></span>
                        <span th:if="${course.category == null}" style="color:var(--muted);">—</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/courses/restore/{id}(id=${course.id})}" method="post"
                              class="d-inline">
                            <button type="submit" class="btn btn-success-soft">
                                <i class="bi bi-arrow-counterclockwise me-1"></i> Khôi phục
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty -->
        <div th:if="${courses == null || courses.isEmpty()}" class="empty-state">
            <i class="bi bi-trash3"></i>
            <p>Thùng rác trống.</p>
            <a th:href="@{/admin/courses}" class="btn btn-ghost mt-2">Quay lại danh sách</a>
        </div>

    </div>
</main>

<footer class="footer-main">
    <div class="container">
        <p>&copy; 2026 Edu Course Hub. Hệ thống đăng ký học phần.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
