<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.id != null} ? 'Chỉnh sửa học phần – Admin' : 'Thêm học phần – Admin'">Form học phần</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<!-- Admin Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark-mode sticky-top" style="padding:.75rem 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}" style="font-weight:700;font-size:1rem;color:#fff;display:flex;align-items:center;gap:6px;text-decoration:none;">
            <i class="bi bi-mortarboard-fill" style="color:#6ee7b7;"></i> Edu Course Hub
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/courses}">Quản lý học phần</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="user-info">
                    <i class="bi bi-shield-check" style="color:#6ee7b7;"></i>
                    <span sec:authentication="name"></span>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-ghost" style="border-color:#3a3a38;color:#a8a6a0;">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="page-shell">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <!-- Back link -->
                <a th:href="@{/admin/courses}"
                   style="font-size:.875rem;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.25rem;">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>

                <div class="card-base p-0" style="overflow:hidden;">
                    <!-- Card header -->
                    <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg);">
                        <h3 style="font-size:1.125rem;font-weight:700;margin:0;"
                            th:text="${course.id != null} ? 'Chỉnh sửa học phần' : 'Thêm học phần mới'"></h3>
                    </div>

                    <!-- Form body -->
                    <div style="padding:1.5rem;">
                        <form th:action="${course.id != null} ? @{/admin/courses/edit/{id}(id=${course.id})} : @{/admin/courses/create}"
                              method="post" enctype="multipart/form-data">

                            <div class="field">
                                <label for="name">Tên học phần <span style="color:var(--danger);">*</span></label>
                                <input type="text" id="name" name="name" th:value="${course.name}"
                                       placeholder="Ví dụ: Lập trình Java nâng cao" required>
                            </div>

                            <div class="field">
                                <label for="credits">Số tín chỉ <span style="color:var(--danger);">*</span></label>
                                <input type="number" id="credits" name="credits"
                                       th:value="${course.credits}" min="1" max="10"
                                       placeholder="Nhập số tín chỉ (1–10)" required>
                            </div>

                            <div class="field">
                                <label for="lecturer">Giảng viên</label>
                                <input type="text" id="lecturer" name="lecturer"
                                       th:value="${course.lecturer}" placeholder="Nhập tên giảng viên">
                            </div>

                            <div class="field">
                                <label for="categoryId">Danh mục</label>
                                <select id="categoryId" name="categoryId">
                                    <option value="">— Chọn danh mục —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:selected="${course.category != null && course.category.id == cat.id}"
                                            th:text="${cat.name}"></option>
                                </select>
                            </div>

                            <div class="field">
                                <label for="imageFile">Ảnh học phần</label>
                                <!-- Preview khi edit -->
                                <div th:if="${course.id != null && course.image != null && !course.image.isEmpty()}"
                                     style="margin-bottom:.625rem;">
                                    <img th:src="${course.image}" alt="Ảnh hiện tại"
                                         style="height:90px;border-radius:8px;object-fit:cover;border:1px solid var(--border);">
                                    <p style="font-size:.75rem;color:var(--muted);margin:.25rem 0 0;">Chọn ảnh mới để thay thế</p>
                                </div>
                                <input type="file" id="imageFile" name="imageFile" accept="image/*">
                                <p class="hint">Hỗ trợ JPG, PNG, WEBP. Tối đa 5 MB.</p>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-3">
                                <a th:href="@{/admin/courses}" class="btn btn-ghost">Hủy</a>
                                <button type="submit" class="btn btn-accent"
                                        th:text="${course.id != null} ? 'Cập nhật' : 'Tạo mới'">
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<footer class="footer-main">
    <div class="container">
        <p>&copy; 2026 Edu Course Hub. Hệ thống đăng ký học phần.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
