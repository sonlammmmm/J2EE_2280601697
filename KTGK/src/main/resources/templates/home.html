<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Course Hub – Trang chủ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-main sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> Edu Course Hub
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <i class="bi bi-list fs-5"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/home}">Trang chủ</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/enroll/my-courses}">Học phần của tôi</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/courses}">Quản lý</a>
                </li>
            </ul>

            <!-- Search -->
            <form class="d-flex align-items-center gap-2 me-3" th:action="@{/courses/search}" method="get">
                <input class="search-input" type="search" name="keyword"
                       placeholder="Tìm học phần..." th:value="${keyword}">
                <button class="search-btn" type="submit"><i class="bi bi-search"></i></button>
            </form>

            <!-- Auth -->
            <div class="d-flex align-items-center gap-2">
                <span sec:authorize="isAuthenticated()" style="font-size:.875rem;color:var(--muted);">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
                </span>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn-ghost btn">Đăng xuất</button>
                </form>
                <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-ghost">Đăng nhập</a>
                <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-primary-dark">Đăng ký</a>
            </div>
        </div>
    </div>
</nav>

<main class="page-shell">
    <div class="container py-4">

        <!-- Alerts -->
        <div th:if="${success}" class="alert-strip alert-success-strip">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert-strip alert-danger-strip">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Page header -->
        <div class="page-header">
            <div>
                <h2 th:if="${keyword == null}">Danh sách học phần</h2>
                <h2 th:if="${keyword != null}">
                    Kết quả: <span th:text="${keyword}"></span>
                </h2>
                <p th:if="${keyword == null}">Chọn học phần phù hợp và bắt đầu đăng ký.</p>
                <p th:if="${keyword != null}" th:text="'Tìm thấy ' + ${coursePage.totalElements} + ' học phần'"></p>
            </div>
            <span class="tag" th:text="${coursePage.totalElements} + ' học phần'"></span>
        </div>

        <!-- Course grid -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3"
             th:if="${coursePage.totalElements > 0}">
            <div class="col" th:each="course : ${coursePage.content}">
                <article class="card-base course-card card-hover h-100">
                    <img th:src="${course.image != null && !course.image.isEmpty()} ? ${course.image} : 'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=600&q=70'"
                         class="thumb" alt="Ảnh học phần">
                    <div class="body">
                        <h3 class="title" th:text="${course.name}"></h3>
                        <div class="meta">
                            <span class="tag tag-accent">
                                <i class="bi bi-award"></i>
                                <span th:text="${course.credits} + ' tín chỉ'"></span>
                            </span>
                            <span th:if="${course.category != null}" class="tag" th:text="${course.category.name}"></span>
                        </div>
                        <p style="font-size:.8125rem;color:var(--muted);margin:0;">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${course.lecturer != null && !course.lecturer.isEmpty()} ? ${course.lecturer} : 'Chưa cập nhật'"></span>
                        </p>
                    </div>
                    <div class="footer-area" sec:authorize="hasRole('STUDENT')">
                        <form th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-accent w-100">
                                <i class="bi bi-plus-circle me-1"></i> Đăng ký
                            </button>
                        </form>
                    </div>
                </article>
            </div>
        </div>

        <!-- Empty -->
        <div th:if="${coursePage.totalElements == 0}" class="empty-state">
            <i class="bi bi-inbox"></i>
            <p>Không tìm thấy học phần nào.</p>
            <a th:href="@{/courses}" th:if="${keyword != null}" class="btn btn-ghost mt-2">Xem tất cả</a>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" th:if="${coursePage.totalPages > 1}">
            <div class="pager">
                <a th:href="@{/courses(page=${coursePage.number - 1}, keyword=${keyword})}"
                   th:classappend="${coursePage.number == 0} ? 'disabled'">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <th:block th:each="i : ${#numbers.sequence(0, coursePage.totalPages - 1)}">
                    <a th:href="@{/courses(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}"
                       th:classappend="${i == coursePage.number} ? 'active'"></a>
                </th:block>
                <a th:href="@{/courses(page=${coursePage.number + 1}, keyword=${keyword})}"
                   th:classappend="${coursePage.number >= coursePage.totalPages - 1} ? 'disabled'">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </div>
        </div>

    </div>
</main>

<footer class="footer-main">
    <div class="container">
        <p>&copy; 2026 Edu Course Hub. Hệ thống đăng ký học phần.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
