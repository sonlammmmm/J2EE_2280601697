<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học phần của tôi – Edu Course Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-main sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> Edu Course Hub
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <i class="bi bi-list fs-5"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}">Trang chủ</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link active" th:href="@{/enroll/my-courses}">Học phần của tôi</a>
                </li>
            </ul>
            <form class="d-flex align-items-center gap-2 me-3" th:action="@{/courses/search}" method="get">
                <input class="search-input" type="search" name="keyword" placeholder="Tìm học phần...">
                <button class="search-btn" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <div class="d-flex align-items-center gap-2">
                <span sec:authorize="isAuthenticated()" style="font-size:.875rem;color:var(--muted);">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-ghost">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="page-shell">
    <div class="container py-4">
        <div class="page-header">
            <div>
                <h2>Học phần đã đăng ký</h2>
                <p>Danh sách học phần bạn đã đăng ký trong hệ thống.</p>
            </div>
            <span class="tag" th:if="${enrollments != null}"
                  th:text="${enrollments.size()} + ' học phần'"></span>
        </div>

        <!-- Alert messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Table -->
        <div th:if="${enrollments != null && !enrollments.isEmpty()}" class="table-card">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Hình ảnh</th>
                    <th>Tên học phần</th>
                    <th>Tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Ngày đăng ký</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="enrollment, stat : ${enrollments}">
                    <td style="color:var(--muted);font-weight:500;" th:text="${stat.index + 1}"></td>
                    <td>
                        <img th:src="${enrollment.course.image != null && !enrollment.course.image.isEmpty()} ? ${enrollment.course.image} : 'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=200&q=60'"
                             alt="course" style="width:72px;height:44px;object-fit:cover;border-radius:6px;">
                    </td>
                    <td style="font-weight:600;" th:text="${enrollment.course.name}"></td>
                    <td>
                        <span class="tag tag-accent"
                              th:text="${enrollment.course.credits} + ' tín chỉ'"></span>
                    </td>
                    <td style="color:var(--muted);"
                        th:text="${enrollment.course.lecturer != null && !enrollment.course.lecturer.isEmpty()} ? ${enrollment.course.lecturer} : '—'">
                    </td>
                    <td style="color:var(--muted);font-size:.8125rem;" th:text="${enrollment.enrollDate}"></td>
                    <td>
                        <form th:action="@{/enroll/cancel/{id}(id=${enrollment.id})}" method="post"
                              onsubmit="return confirm('Bạn có chắc chắn muốn hủy đăng ký học phần này?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-x-circle me-1"></i> Hủy
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty -->
        <div th:if="${enrollments == null || enrollments.isEmpty()}" class="empty-state">
            <i class="bi bi-journal-x"></i>
            <p>Bạn chưa đăng ký học phần nào.</p>
            <a th:href="@{/courses}" class="btn btn-accent mt-2">Xem danh sách học phần</a>
        </div>

    </div>
</main>

<footer class="footer-main">
    <div class="container">
        <p>&copy; 2026 Edu Course Hub. Hệ thống đăng ký học phần.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
