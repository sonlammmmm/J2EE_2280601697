<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký – Edu Course Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-box">

        <!-- Brand -->
        <div class="text-center mb-4">
            <a th:href="@{/home}" style="color:var(--accent);font-size:1.5rem;text-decoration:none;">
                <i class="bi bi-mortarboard-fill"></i>
            </a>
            <h2 class="mt-2" style="font-size:1.375rem;font-weight:700;letter-spacing:-.02em;">Tạo tài khoản</h2>
            <p style="font-size:.875rem;color:var(--muted);margin:.25rem 0 0;">Tham gia hệ thống để đăng ký học phần.</p>
        </div>

        <!-- Alert -->
        <div th:if="${error}" class="alert-strip alert-danger-strip">
            <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${error}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/register}" method="post" th:object="${student}">
            <div class="field">
                <label for="username">Tên đăng nhập</label>
                <div class="input-icon">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" th:field="*{username}" placeholder="Nhập tên đăng nhập" required>
                </div>
            </div>
            <div class="field">
                <label for="password">Mật khẩu</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" th:field="*{password}" placeholder="Ít nhất 8 ký tự" required>
                </div>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <div class="input-icon">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" th:field="*{email}" placeholder="Nhập địa chỉ email" required>
                </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 mt-1">
                Tạo tài khoản
            </button>
        </form>

        <p class="text-center mt-3" style="font-size:.8125rem;color:var(--muted);">
            Đã có tài khoản?
            <a th:href="@{/login}" style="color:var(--text);font-weight:600;text-decoration:none;">Đăng nhập</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
